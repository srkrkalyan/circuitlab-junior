<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d1b2a" />
  <meta name="description" content="CircuitLab Junior — Learn electronics interactively. Atoms, charge, circuits and more for ages 10–15." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Open Graph -->
  <meta property="og:title" content="CircuitLab Junior" />
  <meta property="og:description" content="Interactive electronics learning for ages 10–15. Free, no login required." />
  <meta property="og:type" content="website" />

  <title>CircuitLab Junior ⚡</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <!-- App shell -->
  <div id="app">

    <!-- HOME SCREEN -->
    <div id="screen-home" class="screen active">
      <div class="home-bg-grid"></div>
      <div class="home-content">
        <div class="home-logo">
          <div class="logo-icon">⚡</div>
          <div class="logo-text">Circuit<span>Lab</span> Junior</div>
        </div>
        <p class="home-tagline">Learn electronics — one spark at a time</p>
        <p class="home-desc">An interactive curriculum covering atoms, charge, circuits, components and more. Built for curious minds aged 10–15.</p>

        <div class="home-stats">
          <div class="hstat"><div class="hstat-n">8</div><div class="hstat-l">Units</div></div>
          <div class="hstat"><div class="hstat-n">42</div><div class="hstat-l">Lessons</div></div>
          <div class="hstat"><div class="hstat-n">16</div><div class="hstat-l">Labs</div></div>
          <div class="hstat"><div class="hstat-n">Free</div><div class="hstat-l">Always</div></div>
        </div>

        <button class="btn-primary btn-large" onclick="App.showCurriculum()">Start Learning →</button>

        <div class="home-scroll-hint">Scroll to explore the curriculum below</div>
      </div>

      <!-- Curriculum overview cards -->
      <div class="curriculum-preview" id="curriculum-preview"></div>
    </div>

    <!-- CURRICULUM SCREEN -->
    <div id="screen-curriculum" class="screen">
      <div class="topbar">
        <button class="back-btn" onclick="App.showHome()">← Home</button>
        <div class="topbar-title">Curriculum</div>
        <div class="topbar-score" id="global-score">0 pts</div>
      </div>
      <div class="curriculum-list" id="curriculum-list"></div>
    </div>

    <!-- LESSON SCREEN -->
    <div id="screen-lesson" class="screen">
      <div class="topbar">
        <button class="back-btn" onclick="App.showCurriculum()">← Back</button>
        <div class="topbar-title" id="lesson-topbar-title">Lesson</div>
        <div class="topbar-score" id="lesson-score-badge">0 pts</div>
      </div>
      <div id="lesson-container"></div>
    </div>

  </div><!-- /#app -->

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/lesson-engine.js"></script>
  <script src="js/atom-canvas.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
